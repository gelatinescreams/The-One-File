name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'theonefile_verse/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'theonefile_verse/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: theonefile_verse
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test

  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: theonefile_verse
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
